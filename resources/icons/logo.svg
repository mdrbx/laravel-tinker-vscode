<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d20"/>
      <stop offset="50%" style="stop-color:#ff6b4a"/>
      <stop offset="100%" style="stop-color:#ff2d20"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Laravel-inspired diamond shape -->
  <g transform="translate(128, 118)">
    <!-- Main diamond -->
    <path d="M0,-65 L55,-10 L0,65 L-55,-10 Z" fill="url(#diamond)" opacity="0.95"/>
    <!-- Inner highlight -->
    <path d="M0,-45 L35,-5 L0,45 L-35,-5 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <!-- Terminal cursor line -->
    <rect x="-18" y="75" width="36" height="4" rx="2" fill="#8ab4f8" opacity="0.9"/>
  </g>
  <!-- ">" prompt symbol -->
  <text x="60" y="200" font-family="Consolas, monospace" font-size="42" font-weight="bold" fill="#8ab4f8" opacity="0.7">&gt;_</text>
</svg>
